name: CI

on:
  push:
    branches: [main] # 限定主分支：避免同仓库 PR 分支 push+pull_request 双重跑
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    strategy:
      # Windows 覆盖行尾/路径分隔符差异（曾因 CRLF checkout 使 vendor 哈希门失效）
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run check
